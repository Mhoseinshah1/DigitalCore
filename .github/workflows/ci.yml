name: DigitalCore CI

# Runs on every PR and push to main, and can be triggered by hand.
# No real secrets are used — only dummy CI values. XUI/network tests are mocked
# in the suite, so no real 3X-UI panel or Telegram token is required.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to keep CI fast.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) Compile, tests, shell syntax, and compose config validation.
  #    pytest uses the in-memory SQLite fallback (no DB service needed) and the
  #    XUI/Telegram integrations are mocked, so this job needs no external state.
  # ---------------------------------------------------------------------------
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Python compile check
        run: python -m compileall app migrations tests

      - name: Run tests
        run: python -m pytest -q

      - name: Shell syntax checks
        run: |
          bash -n install.sh
          find scripts -name "*.sh" -type f -print0 | xargs -0 -r bash -n

      - name: Validate docker compose config
        run: |
          cp .env.example .env
          docker compose config >/dev/null
          echo "docker compose config is valid"

  # ---------------------------------------------------------------------------
  # 2) Alembic migrations must apply cleanly on a fresh PostgreSQL database.
  # ---------------------------------------------------------------------------
  migration-check:
    name: Alembic migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: digitalcore
          POSTGRES_PASSWORD: digitalcore
          POSTGRES_DB: digitalcore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U digitalcore -d digitalcore_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://digitalcore:digitalcore@localhost:5432/digitalcore_test
      REDIS_URL: redis://localhost:6379/0
      TESTING: "true"
      BOT_TOKEN: "dummy:token"
      SECRET_KEY: ci-secret-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin12345
      ADMIN_EMAIL: admin@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import asyncio, os, asyncpg
          url = os.environ["DATABASE_URL"].replace("postgresql+asyncpg://", "postgresql://")
          async def main():
              for attempt in range(30):
                  try:
                      conn = await asyncpg.connect(url)
                      await conn.close()
                      print("postgres is ready")
                      return
                  except Exception as exc:  # noqa: BLE001
                      print(f"waiting for postgres ({attempt+1}/30): {exc}")
                      await asyncio.sleep(2)
              raise SystemExit("postgres did not become ready in time")
          asyncio.run(main())
          PY

      - name: Run migrations
        run: |
          alembic upgrade head
          alembic current

  # ---------------------------------------------------------------------------
  # 3) Docker image + Compose must be valid and buildable.
  #    Uses a dummy .env (no real secrets) purely for compose interpolation.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dummy CI .env
        run: |
          cp .env.example .env
          echo "Using dummy .env for compose interpolation (no real secrets)."

      - name: Validate compose config
        run: docker compose config >/dev/null

      - name: Build images
        run: docker compose build backend bot worker

  # ---------------------------------------------------------------------------
  # 4) Optional smoke test — best-effort, never blocks the pipeline.
  #    Boots postgres + redis + backend, applies migrations, and hits /health and
  #    /ready. Runs only on push-to-main and manual dispatch (skipped on PRs to
  #    keep PR CI fast). continue-on-error keeps a flaky boot from failing CI.
  #    TODO: promote to a required check once boot timing is proven stable in CI.
  # ---------------------------------------------------------------------------
  optional-smoke:
    name: Optional smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dummy CI .env
        run: cp .env.example .env

      - name: Boot postgres, redis, backend
        run: |
          docker compose up -d postgres redis backend
          echo "waiting for services to settle..."

      - name: Apply migrations
        run: |
          for i in $(seq 1 20); do
            if docker compose exec -T backend alembic upgrade head; then
              echo "migrations applied"; break
            fi
            echo "retry $i/20..."; sleep 3
          done

      - name: Health checks
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health; then echo; break; fi
            echo "waiting for backend /health ($i/20)..."; sleep 3
          done
          curl -fsS http://127.0.0.1:8000/health
          # /ready may report 503 until DB+Redis are fully up; show it but don't fail.
          curl -sS -o /dev/null -w "ready: %{http_code}\n" http://127.0.0.1:8000/ready || true

      - name: Tear down
        if: always()
        run: docker compose down -v
