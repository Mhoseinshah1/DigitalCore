# DigitalCore stack (Phase 1).
#
# Configuration comes from the .env file (copy it from .env.example).
# Bring everything up with:  docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    image: digitalcore:latest
    restart: unless-stopped
    command: ["backend"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  bot:
    build: .
    image: digitalcore:latest
    # Exits cleanly (code 0) when TELEGRAM_BOT_TOKEN is empty; on-failure so a
    # graceful "no token" exit does not restart-loop, but real crashes do.
    restart: on-failure
    command: ["bot"]
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
